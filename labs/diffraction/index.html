<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interferenza e Diffrazione — Galileo Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/lab.css">
</head>
<body>

  <header class="lab-header">
    <a href="../../" class="lab-back">← GALILEOLAB</a>
    <div class="lab-header-info">
      <span class="tag tag-ottica">Ottica</span>
      <span class="lab-header-title">Interferenza e Diffrazione</span>
    </div>
    <div class="lab-header-right">
      <button class="btn-icon" id="themeToggle" title="Cambia tema">◑</button>
    </div>
  </header>

  <div class="lab-layout">
    <div class="lab-canvas-area">
      <canvas id="simCanvas"></canvas>
      <div class="resize-handle" id="resizeHandle"></div>
      <div class="graph-area" id="graphArea">
        <div class="graph-toolbar">
          <button class="btn-graph-action" id="btnFullscreen" title="Schermo intero">⛶</button>
        </div>
        <canvas id="graphCanvas"></canvas>
      </div>
      <div class="readout-bar" id="readout"></div>
    </div>

    <aside class="lab-panel">
      <div class="panel-scroll">
        <div id="controls"></div>
        <div class="panel-actions">
          <button class="btn-primary" id="btnPlay">▶  AGGIORNA</button>
          <button class="btn-secondary" id="btnReset">↺  RESET</button>
        </div>
      </div>
    </aside>
  </div>

  <script src="../../shared/lab.js"></script>
  <script src="sim.js"></script>
</body>
</html>
