<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Solare — Galileo Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../shared/lab.css">
  <style>
    body { height: 100vh; overflow: hidden; }

    /* ── Tab bar ── */
    .ss-tabs {
      display: flex;
      gap: 2px;
      padding: 6px 16px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-idle);
      flex-shrink: 0;
    }
    .ss-tab {
      padding: 6px 22px;
      border-radius: 5px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      cursor: pointer;
      transition: all .14s;
    }
    .ss-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
    .ss-tab.active {
      background: rgba(0,212,255,0.09);
      border-color: rgba(0,212,255,0.28);
      color: var(--accent);
    }

    .ss-content { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .ss-view { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .ss-view.hidden { display: none !important; }

    /* ── Dati: grid ── */
    #view-data { overflow-y: auto; flex-wrap: wrap; align-content: flex-start; padding: 20px 22px; gap: 14px; }

    .obj-card {
      width: 150px;
      background: var(--bg-panel);
      border: 1px solid var(--border-idle);
      border-radius: 10px;
      padding: 14px 12px 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .obj-card:hover { border-color: rgba(0,212,255,0.40); background: rgba(0,212,255,0.04); }
    .obj-card-vis { position: relative; display: flex; align-items: center; justify-content: center; }
    .obj-card-name {
      font-size: 13px; font-weight: 600; color: var(--text-primary); text-align: center;
    }
    .obj-card-badge {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 0.5px;
      padding: 2px 7px; border-radius: 3px;
    }
    .obj-card-stats {
      width: 100%;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .obj-card-stat { display: flex; justify-content: space-between; gap: 4px; }
    .obj-card-stat-val { color: var(--text-primary); }

    /* Group labels in grid */
    .grid-group-label {
      width: 100%;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-hint);
      padding: 4px 2px 2px;
      border-bottom: 1px solid var(--border-idle);
    }

    /* ── Modal ── */
    .ss-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .ss-modal-overlay.hidden { display: none; }
    .ss-modal {
      background: var(--bg-panel);
      border: 1px solid var(--border-idle);
      border-radius: 14px;
      width: min(580px, 92vw);
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px 32px 28px;
      position: relative;
    }
    .ss-modal-close {
      position: absolute; top: 14px; right: 16px;
      background: transparent; border: none;
      color: var(--text-secondary); font-size: 18px;
      cursor: pointer; line-height: 1; padding: 4px 8px;
      border-radius: 4px;
    }
    .ss-modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
    .ss-modal-header { display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
    .ss-modal-name { font-size: 26px; font-weight: 700; color: var(--text-primary); }
    .ss-modal-meta { font-size: 12px; color: var(--text-secondary); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
    .ss-badge { display:inline-block;padding:2px 8px;border-radius:4px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.4px; }
    .ss-param-group { margin-bottom: 16px; }
    .ss-param-group-title {
      font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 1px; text-transform: uppercase; color: var(--accent);
      margin-bottom: 6px; padding-bottom: 4px;
      border-bottom: 1px solid rgba(0,212,255,0.14);
    }
    .ss-param-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 4px 0; border-bottom: 1px solid var(--border-idle); gap: 12px;
    }
    .ss-param-row:last-child { border-bottom: none; }
    .ss-param-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .ss-param-value { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-primary); text-align: right; }

    /* ── Canvas views ── */
    #view-sizes, #view-distances { flex-direction: column; }
    .ss-toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: var(--bg-panel); border-bottom: 1px solid var(--border-idle);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .ss-toolbar-label { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.8px; color:var(--text-hint); margin-right:1px; }
    .ss-toolbar button {
      padding: 3px 11px; border-radius: 4px;
      border: 1px solid var(--border-idle); background: transparent;
      color: var(--text-secondary); font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.3px;
      cursor: pointer; transition: all .12s;
    }
    .ss-toolbar button:hover, .ss-toolbar button.active {
      background: rgba(0,212,255,0.09); border-color: rgba(0,212,255,0.28); color: var(--accent);
    }
    .ss-toolbar .sep { width:1px; height:16px; background:var(--border-idle); margin:0 5px; }

    .ss-canvas-wrap { flex:1; min-height:0; overflow:hidden; position:relative; }
    #view-sizes .ss-canvas-wrap { overflow-x:auto; overflow-y:hidden; }
    .ss-canvas-wrap canvas { display:block; }

    .ss-tip {
      position:absolute; pointer-events:none;
      background:var(--bg-panel); border:1px solid var(--border-idle);
      border-radius:6px; padding:5px 10px;
      font-family:'Space Mono',monospace; font-size:10px; color:var(--text-primary);
      display:none; z-index:10; white-space:nowrap;
    }
    .dist-hint {
      position:absolute; bottom:10px; right:12px;
      font-family:'Space Mono',monospace; font-size:9px; color:var(--text-hint);
      pointer-events:none;
    }
  </style>
</head>
<body>

  <header class="lab-header">
    <a href="../../" class="lab-back">← GALILEOLAB</a>
    <div class="lab-header-info">
      <span class="tag tag-astronomia">Astronomia</span>
      <span class="lab-header-title">Sistema Solare</span>
    </div>
    <div class="lab-header-right">
      <button class="btn-icon" id="themeToggle" title="Cambia tema">◑</button>
    </div>
  </header>

  <div class="ss-tabs">
    <button class="ss-tab active" data-tab="data">DATI</button>
    <button class="ss-tab" data-tab="sizes">DIMENSIONI</button>
    <button class="ss-tab" data-tab="distances">DISTANZE 3D</button>
  </div>

  <div class="ss-content">

    <!-- Tab 1: Dati - grid view -->
    <div class="ss-view" id="view-data">
      <div id="objectGrid"></div>
    </div>

    <!-- Tab 2: Dimensioni -->
    <div class="ss-view hidden" id="view-sizes">
      <div class="ss-toolbar">
        <span class="ss-toolbar-label">SCALA:</span>
        <button class="sz-scale active" data-s="noSun">Pianeti</button>
        <button class="sz-scale" data-s="sun">Con Sole</button>
        <div class="sep"></div>
        <span class="ss-toolbar-label">MOSTRA:</span>
        <button class="sz-filter active" data-f="planets">Pianeti</button>
        <button class="sz-filter" data-f="moons">Lune principali</button>
      </div>
      <div class="ss-canvas-wrap" id="sizeWrap">
        <canvas id="sizeCanvas"></canvas>
        <div class="ss-tip" id="sizeTip"></div>
      </div>
    </div>

    <!-- Tab 3: Distanze 3D -->
    <div class="ss-view hidden" id="view-distances">
      <div class="ss-toolbar">
        <span class="ss-toolbar-label">ANIMAZIONE:</span>
        <button id="btnDistPlay">▶ AVVIA</button>
        <button id="btnDistReset" title="Reimposta camera">↺ CAMERA</button>
        <div class="sep"></div>
        <span class="ss-toolbar-label">SCALA:</span>
        <button class="dst-scale active" data-s="log">Log</button>
        <button class="dst-scale" data-s="linear">Lineare</button>
        <div class="sep"></div>
        <span class="ss-toolbar-label">OGGETTI:</span>
        <button class="dst-filter active" data-f="planets">Pianeti</button>
        <button class="dst-filter" data-f="all">+ Nani</button>
      </div>
      <div class="ss-canvas-wrap" id="distWrap">
        <canvas id="distCanvas"></canvas>
        <div class="ss-tip" id="distTip"></div>
        <div class="dist-hint">Trascina: ruota · Dx: sposta · Scroll: zoom</div>
      </div>
    </div>

  </div>

  <!-- Detail modal -->
  <div class="ss-modal-overlay hidden" id="modalOverlay">
    <div class="ss-modal" id="detailModal">
      <button class="ss-modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="../../shared/lab.js"></script>
  <script src="sim.js"></script>
</body>
</html>
